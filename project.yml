name: Fantasia
options:
  bundleIdPrefix: com.fantasiaai
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15"
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 11.0.0
  purchases-ios:
    url: https://github.com/RevenueCat/purchases-ios
    majorVersion: 5.79.0
  google-signin:
    url: https://github.com/google/GoogleSignIn-iOS
    majorVersion: 7.0.0
targets:
  Fantasia:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources: [Fantasia]
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: purchases-ios
        product: RevenueCat
      - package: google-signin
        product: GoogleSignIn
      - package: google-signin
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fantasiaai
        PRODUCT_NAME: Fantasia
        MARKETING_VERSION: 0.0.1
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Fantasia/Fantasia.entitlements
    info:
      path: Fantasia/Info.plist
      properties:
        CFBundleDisplayName: Fantasia
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.969774210522-77jg1i3do9e5go118tf4asddulvr6ps2
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryAddUsageDescription: "Fantasia saves your generated videos to your photo library."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
  FantasiaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources: [FantasiaTests]
    dependencies:
      - target: Fantasia
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fantasiaai.tests
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
        GENERATE_INFOPLIST_FILE: YES
